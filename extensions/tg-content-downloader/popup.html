<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jarvis TG Content Downloader</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 520px;
        min-height: 340px;
        margin: 0;
        color: #172033;
        background: #f8fafc;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 14px 10px;
        border-bottom: 1px solid #e2e8f0;
        background: #fff;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.3;
      }

      .toolbar,
      .row-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        padding: 0 10px;
        border: 1px solid #0f172a;
        border-radius: 6px;
        color: #fff;
        background: #0f172a;
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
        cursor: pointer;
      }

      button.secondary,
      a.secondary {
        color: #172033;
        border-color: #cbd5e1;
        background: #fff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      main {
        padding: 12px 14px 14px;
      }

      .status {
        min-height: 20px;
        margin: 0 0 10px;
        color: #64748b;
        font-size: 12px;
        line-height: 1.5;
      }

      .table-wrap {
        overflow: auto;
        max-height: 236px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #fff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 8px 7px;
        border-bottom: 1px solid #edf2f7;
        font-size: 12px;
        line-height: 1.35;
        text-align: left;
        vertical-align: middle;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        color: #475569;
        background: #f8fafc;
        font-weight: 800;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .check-cell {
        width: 34px;
      }

      .type-cell {
        width: 64px;
        color: #475569;
      }

      .action-cell {
        width: 126px;
      }

      .file-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty {
        display: none;
        padding: 42px 16px;
        color: #64748b;
        font-size: 13px;
        text-align: center;
      }

      body.is-empty .table-wrap {
        display: none;
      }

      body.is-empty .empty {
        display: block;
      }
    </style>
  </head>
  <body class="is-empty">
    <header>
      <h1>Jarvis TG Content Downloader</h1>
      <div class="toolbar">
        <button id="download-selected" type="button" disabled>Download Selected</button>
        <button id="copy-selected" class="secondary" type="button" disabled>Copy</button>
        <button id="clear" class="secondary" type="button" disabled>Clear</button>
      </div>
    </header>

    <main>
      <p id="status" class="status">Scanning Telegram media...</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="check-cell"><input id="select-all" type="checkbox" checked></th>
              <th>File</th>
              <th class="type-cell">Type</th>
              <th class="action-cell">Action</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="empty">
        No Telegram message media detected on this tab.
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
