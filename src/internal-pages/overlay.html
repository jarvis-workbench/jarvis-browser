<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data: file: jarvis-browser: https: http:; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
    <title>工具浮层</title>
    <style>
      * { box-sizing: border-box; }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
        color: #202124;
        font: 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
      }
      .wrap {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 4px;
        width: calc(100% - 24px);
        height: calc(100% - 24px);
        min-height: calc(100vh - 24px);
        margin: 12px;
        border: 1px solid rgba(218, 220, 224, 0.95);
        border-radius: 14px;
        padding: 8px;
        overflow: hidden;
        background: #fff;
        box-shadow:
          0 1px 3px rgba(60, 64, 67, 0.22),
          0 8px 24px rgba(60, 64, 67, 0.18);
      }
      header { display: grid; gap: 3px; padding: 6px 8px 7px; }
      header strong { font-size: 13px; font-weight: 600; }
      header span,
      small,
      .empty { color: #5f6368; font-size: 12px; }
      .list {
        display: grid;
        gap: 1px;
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: #bdc1c6 transparent;
      }
      .list--with-pin .item {
        grid-template-columns: minmax(0, 1fr) 28px;
      }
      .item {
        display: grid;
        min-height: 38px;
        grid-template-columns: minmax(0, 1fr);
        align-items: center;
        gap: 2px;
        border: 0;
        border-radius: 8px;
        padding: 0;
        background: transparent;
        color: #202124;
        text-align: left;
        font: inherit;
      }
      .item-main {
        display: grid;
        min-width: 0;
        width: 100%;
        min-height: 38px;
        grid-template-columns: 24px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        border: 0;
        border-radius: 8px;
        padding: 6px 8px;
        background: transparent;
        color: inherit;
        text-align: left;
        font: inherit;
        cursor: pointer;
      }
      .item-main:hover {
        background: #f1f3f4;
      }
      .item-main:disabled {
        cursor: default;
      }
      .item-main:disabled:hover {
        background: transparent;
      }
      .pin-button {
        display: inline-flex;
        width: 28px;
        height: 28px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 50%;
        padding: 0;
        background: transparent;
        color: #80868b;
        cursor: pointer;
      }
      .pin-button:hover {
        background: #e8eaed;
        color: #202124;
      }
      .pin-button.is-pinned {
        color: #1a73e8;
      }
      .pin-button svg {
        display: block;
        width: 16px;
        height: 16px;
      }
      .pin-spacer {
        width: 28px;
        height: 28px;
      }
      .item-disabled { color: #9aa0a6; cursor: default; }
      .icon {
        display: inline-flex;
        width: 24px;
        height: 24px;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 50%;
        background: #f1f3f4;
        color: #5f6368;
        font-weight: 700;
      }
      .icon img { width: 18px; height: 18px; object-fit: contain; }
      .text { display: grid; min-width: 0; gap: 2px; }
      .text strong { font-size: 13px; font-weight: 600; }
      .text strong,
      .text small { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .empty { margin: 0; padding: 16px 8px; text-align: center; }
    </style>
  </head>
  <body>
    <main id="root" class="wrap"></main>
    <script>
      const root = document.getElementById("root");
      let overlayAnchor;

      function render(model) {
        overlayAnchor = model.anchor;
        const header = document.createElement("header");
        const title = document.createElement("strong");
        title.textContent = model.title || "";
        header.append(title);
        if (model.subtitle) {
          const subtitle = document.createElement("span");
          subtitle.textContent = model.subtitle;
          header.append(subtitle);
        }

        const list = document.createElement("section");
        list.className = "list";
        const items = Array.isArray(model.items) ? model.items : [];
        const hasPinActions = items.some((item) => item.pinAction);
        if (hasPinActions) {
          list.classList.add("list--with-pin");
        }
        if (items.length) {
          for (const item of items) {
            list.append(renderItem(item, hasPinActions));
          }
        } else {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = model.emptyText || "暂无内容";
          list.append(empty);
        }

        root.replaceChildren(header, list);
      }

      function renderItem(item, hasPinActions) {
        const row = document.createElement("div");
        row.className = `item${item.disabled ? " item-disabled" : ""}`;

        const button = document.createElement("button");
        button.type = "button";
        button.className = "item-main";
        button.disabled = Boolean(item.disabled);

        const icon = document.createElement("span");
        icon.className = "icon";
        if (item.icon) {
          const img = document.createElement("img");
          img.src = toDisplayIcon(item.icon);
          img.alt = "";
          icon.append(img);
        } else {
          icon.textContent = String(item.label || "").slice(0, 1);
        }

        const text = document.createElement("span");
        text.className = "text";
        const label = document.createElement("strong");
        label.textContent = item.label || "";
        text.append(label);
        if (item.detail) {
          const detail = document.createElement("small");
          detail.textContent = item.detail;
          text.append(detail);
        }

        button.append(icon, text);
        button.addEventListener("click", () => {
          if (item.disabled) {
            return;
          }
          window.jarvisOverlay.action({ action: item.action, id: item.id, anchor: overlayAnchor }).catch(() => undefined);
        });

        row.append(button);

        if (hasPinActions) {
          if (item.pinAction) {
            const pinButton = document.createElement("button");
            pinButton.type = "button";
            pinButton.className = `pin-button${item.pinned ? " is-pinned" : ""}`;
            pinButton.title = item.pinned ? "取消固定" : "固定";
            pinButton.setAttribute("aria-label", item.pinned ? "取消固定" : "固定");
            pinButton.innerHTML = item.pinned
              ? '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.2 4.4 19.6 8.8c.4.4.4 1 0 1.4l-1.7 1.7-1.2-1.2-3.2 3.2.8 4.8-1.4 1.4-3.7-3.7L5.4 20.2 3.8 18.6l3.8-3.8-3.7-3.7 1.4-1.4 4.8.8 3.2-3.2-1.2-1.2 1.7-1.7c.4-.4 1-.4 1.4 0Z" fill="currentColor"/></svg>'
              : '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14.8 4.8 19.2 9.2c.4.4.4 1 0 1.4l-1.7 1.7-.9-.9-3.3 3.3.7 4.3-1.1 1.1-3.4-3.4-3.7 3.7-1.4-1.4 3.7-3.7-3.4-3.4 1.1-1.1 4.3.7 3.3-3.3-.9-.9 1.7-1.7c.4-.4 1-.4 1.4 0Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>';
            pinButton.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              window.jarvisOverlay.action({ action: "extension-pin", id: item.id, anchor: overlayAnchor }).catch(() => undefined);
            });
            row.append(pinButton);
          } else {
            const spacer = document.createElement("span");
            spacer.className = "pin-spacer";
            row.append(spacer);
          }
        }

        return row;
      }

      function toDisplayIcon(value) {
        if (!value || typeof value !== "string") {
          return "";
        }
        if (/^(data:|file:|jarvis-browser:|https?:)/i.test(value)) {
          return value;
        }
        if (value.startsWith("/")) {
          return `file://${value.split("/").map(encodeURIComponent).join("/")}`;
        }
        return value;
      }

      window.jarvisOverlay.onData(render);
    </script>
  </body>
</html>
